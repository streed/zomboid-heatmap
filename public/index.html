<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
    <title>Zomboid Event Heatmap</title>
    <link rel="stylesheet" href="vendor/leaflet.css" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="map"></div>

    <aside id="panel">
      <header>
        <span class="dot"></span>
        <h1>Event Heatmap</h1>
        <button id="collapse" title="Collapse panel" aria-label="Collapse panel">–</button>
      </header>

      <div id="panel-body">
        <section>
          <h2>Categories</h2>
          <div id="categories" class="categories"></div>
        </section>

        <section>
          <h2>Filter by player</h2>
          <select id="player-filter" class="player-filter">
            <option value="">All players</option>
          </select>
        </section>

        <section id="players-section">
          <h2>
            <label class="players-toggle">
              <input id="show-players" type="checkbox" checked />
              Live players <span id="players-count" class="muted"></span>
            </label>
          </h2>
          <div id="players" class="players"></div>
        </section>

        <section id="time">
          <h2>Time range</h2>
          <div class="time-head">
            <div id="time-label" class="muted">all</div>
            <button id="time-play" title="Animate from the start day up to the latest">▶ Play</button>
          </div>
          <input id="time-start" type="range" />
          <input id="time-end" type="range" />
        </section>

        <footer>
          <span id="stat" class="muted"></span>
        </footer>
      </div>
    </aside>

    <div id="error"></div>

    <script type="module" src="app.js"></script>
  </body>
</html>

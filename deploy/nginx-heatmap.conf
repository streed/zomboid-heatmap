# nginx snippet for reverse-proxying the heatmap at /heatmap on an existing
# domain. Drop these two `location` blocks INSIDE the existing `server { ... }`
# block for your domain (the one with `server_name`, TLS, etc.). Do NOT add
# another server block.
#
# Apply:    sudo nginx -t && sudo systemctl reload nginx
# Verify:   curl -sI https://<your-host>/heatmap/   (should be 301 -> /heatmap/)
#           curl -sI https://<your-host>/heatmap/   (then 200)

# Force the trailing slash so relative URLs in the page resolve under /heatmap/
# rather than /. Exact-match (`=`) has highest priority.
location = /heatmap { return 301 /heatmap/; }

# `^~` tells nginx: if this prefix matches, do NOT also check regex locations.
# That's important because many existing configs have a regex location for
# `.css` / `.js` static assets which would otherwise steal /heatmap/app.js etc.
location ^~ /heatmap/ {
    # Trailing `/` on proxy_pass strips the /heatmap/ prefix upstream, so the
    # app sees `/`, `/api/meta`, `/tiles/...` — the routes it actually defines.
    proxy_pass http://127.0.0.1:8080/;

    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}
